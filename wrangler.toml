name = "donation-middleware"
main = "index.js"
compatibility_date = "2026-05-20"
workers_dev = false
preview_urls = false

[vars]
FIBERY_ACCOUNT = "fosswiki"

[observability]
enabled = true

[observability.logs]
enabled = true

[[routes]]
pattern = "donationwebhook.foss.wiki"
zone_name = "foss.wiki"
custom_domain = true
enabled = true
previews_enabled = false
