name = "donation-middleware"
main = "index.js"
compatibility_date = "2026-05-20"
workers_dev = false
preview_urls = false

[vars]
FIBERY_ACCOUNT = "fosswiki"

[[routes]]
pattern = "donationwebhook.foss.wiki"
zone_name = "foss.wiki"
custom_domain = true
enabled = true
previews_enabled = false

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
